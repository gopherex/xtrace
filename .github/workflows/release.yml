name: Release

# Root module tags only (vX.Y.Z). Submodule tags like contrib/libs/xlog/vX.Y.Z
# start with "contrib/" and do not match "v*", so they do not trigger a release.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  # Releases must build green: run the full CI suite over every module.
  ci:
    uses: ./.github/workflows/ci.yml

  release:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: gh release create "$TAG" --verify-tag --generate-notes --title "$TAG"
